<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <!-- AgroVoz brand mark: the login's spoken-word waveform (uneven bars, like
       real speech) on the olive gradient the app bar uses. -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5a6b35"/>
      <stop offset="1" stop-color="#3c4a22"/>
    </linearGradient>
  </defs>
  <rect width="48" height="48" rx="11" fill="url(#g)"/>
  <g fill="#f5f2ea">
    <rect x="8"  y="17" width="4" height="14" rx="2"/>
    <rect x="15" y="12" width="4" height="24" rx="2"/>
    <rect x="22" y="8"  width="4" height="32" rx="2"/>
    <rect x="29" y="15" width="4" height="18" rx="2"/>
    <rect x="36" y="11" width="4" height="26" rx="2"/>
  </g>
</svg>
